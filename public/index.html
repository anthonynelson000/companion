<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Собеседник">
<meta name="theme-color" content="#0e0f14">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Собеседник</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f14; --gold: #c9a96e; --gold-dim: #7a6340;
    --blue: #6ab4e8; --text: #e8e0d0; --muted: #6b6658;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif; overflow: hidden; user-select: none; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1c2e 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 100%, #0c0e1a 0%, transparent 60%), var(--bg); }

  /* ── Waveform avatar ── */
  .waveform { display: flex; align-items: center; justify-content: center; gap: 8px; height: 160px; width: 300px; }
  .waveform .bar { width: 6px; border-radius: 3px; background: var(--gold-dim); transition: background 0.4s; }

  body.idle .bar { animation: idle-breathe 3s ease-in-out infinite; }
  .bar:nth-child(1){height:18px;animation-delay:0s}    .bar:nth-child(2){height:28px;animation-delay:0.2s}
  .bar:nth-child(3){height:44px;animation-delay:0.4s}  .bar:nth-child(4){height:66px;animation-delay:0.6s}
  .bar:nth-child(5){height:86px;animation-delay:0.8s}  .bar:nth-child(6){height:106px;animation-delay:1.0s}
  .bar:nth-child(7){height:120px;animation-delay:1.2s} .bar:nth-child(8){height:106px;animation-delay:1.0s}
  .bar:nth-child(9){height:86px;animation-delay:0.8s}  .bar:nth-child(10){height:66px;animation-delay:0.6s}
  .bar:nth-child(11){height:44px;animation-delay:0.4s} .bar:nth-child(12){height:28px;animation-delay:0.2s}
  .bar:nth-child(13){height:18px;animation-delay:0s}
  @keyframes idle-breathe { 0%,100%{transform:scaleY(0.4);opacity:0.25} 50%{transform:scaleY(0.55);opacity:0.35} }

  /* listening — calm ripple in blue */
  body.listening .bar { background: var(--blue); animation: listen-wave 1.6s ease-in-out infinite; }
  @keyframes listen-wave { 0%,100%{transform:scaleY(0.5);opacity:0.5} 50%{transform:scaleY(1.1);opacity:0.9} }

  /* thinking — slow gold pulse, all bars together */
  body.thinking .bar { background: var(--gold-dim); animation: think-pulse 0.9s ease-in-out infinite; }
  @keyframes think-pulse { 0%,100%{transform:scaleY(0.6);opacity:0.4} 50%{transform:scaleY(0.85);opacity:0.7} }

  /* speaking — full gold, fast wave */
  body.speaking .bar { background: var(--gold); animation: speak-wave 0.5s ease-in-out infinite; }
  @keyframes speak-wave { 0%,100%{transform:scaleY(0.7);opacity:0.7} 50%{transform:scaleY(1.3);opacity:1} }

  .name { position: absolute; top: 40px; font-size: 2rem; font-weight: 300;
    letter-spacing: 0.18em; color: rgba(201,169,110,0.5); text-transform: uppercase; }
  .status { margin-top: 32px; font-size: 1.4rem; font-weight: 300; font-style: italic;
    color: var(--muted); letter-spacing: 0.04em; height: 1.6em; text-align: center; transition: color 0.4s; }
  body.listening .status { color: var(--blue); }
  body.thinking  .status { color: var(--gold-dim); }
  body.speaking  .status { color: var(--gold); }
  .error-banner { display: none; position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(180,60,60,0.85); color: #fff; padding: 14px 28px; border-radius: 10px;
    font-size: 1.1rem; text-align: center; max-width: 320px; }
</style>
</head>
<body class="idle">
<div class="name">Собеседник</div>
<div class="waveform">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div>
</div>
<div class="status" id="status">слушаю…</div>
<div class="error-banner" id="error"></div>


<script>
const SERVER = window.location.hostname === 'localhost' || window.location.protocol === 'file:'
  ? 'http://localhost:3000' : '';

const statusEl = document.getElementById('status');
const errorEl  = document.getElementById('error');

// ── State ────────────────────────────────────────────────────────
let isSpeaking    = false;
let speakingTimer = null;   // 60s watchdog — force-resets if audio stalls
let recognition   = null;
let micActive     = false;
let micEnabled    = false;

function setState(state) {
  document.body.className = state;
  const labels = { idle: '', listening: 'слушаю…', thinking: 'думаю…', speaking: 'говорю…' };
  statusEl.textContent = labels[state] || '';
}

function showError(msg) {
  errorEl.style.display = 'block';
  errorEl.textContent = msg;
  setTimeout(() => errorEl.style.display = 'none', 5000);
}

// ── Speaking flag with watchdog ───────────────────────────────────
// Prevents permanent lockup if audio.onended never fires (iOS bug)
function setSpeaking(val) {
  clearTimeout(speakingTimer);
  isSpeaking = val;
  if (val) {
    speakingTimer = setTimeout(() => {
      isSpeaking = false;
      setState('listening');
      restartMic();
    }, 60000);
  }
}

// ── Mic ──────────────────────────────────────────────────────────
// Rebuilt fresh each turn — avoids stale recognition state on iOS Safari
function buildRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('Используйте Chrome для распознавания речи.'); return null; }
  const r = new SR();
  r.lang           = 'ru-RU';
  r.continuous     = false;   // single-shot: more stable on iOS
  r.interimResults = false;   // final only: avoids double-sends

  r.onstart  = () => { micActive = true; if (!isSpeaking) setState('listening'); };
  r.onend    = () => {
    micActive = false;
    // Auto-restart loop while mic is enabled and not speaking
    if (micEnabled && !isSpeaking) setTimeout(restartMic, 300);
  };
  r.onresult = (e) => {
    if (isSpeaking) return;
    const text = Array.from(e.results)
      .filter(res => res.isFinal)
      .map(res => res[0].transcript)
      .join(' ')
      .trim();
    if (text.length > 2) sendToAI(text);
  };
  r.onerror = (e) => {
    micActive = false;
    if (e.error === 'not-allowed') { showError('Разрешите доступ к микрофону.'); return; }
    if (e.error === 'aborted') return;
    if (micEnabled && !isSpeaking) setTimeout(restartMic, 800);
  };
  return r;
}

function restartMic() {
  if (!micEnabled || isSpeaking || micActive) return;
  recognition = buildRecognition();
  if (recognition) try { recognition.start(); } catch(e) {}
}

function stopMic() {
  micActive = false;
  try { recognition && recognition.abort(); } catch(e) {}
}

// ── AI call ──────────────────────────────────────────────────────
async function sendToAI(userText) {
  stopMic();
  setState('thinking');
  try {
    const res  = await fetch(SERVER + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText, model: 'chat' })
    });
    const data = await res.json();
    if (data.error) { showError('Ошибка: ' + data.error); setState('listening'); restartMic(); return; }
    if (data.reply) {
      const musicMatch = data.reply.match(/\[MUSIC:\s*([^\]]+)\]/);
      if (musicMatch) playMusic(musicMatch[1].trim());
      speak(data.audio);
    } else { setState('listening'); restartMic(); }
  } catch(err) {
    showError('Нет соединения с сервером.');
    setState('listening');
    restartMic();
  }
}

// ── TTS ──────────────────────────────────────────────────────────
function speak(audioB64) {
  setSpeaking(true);
  stopMic();
  setState('speaking');

  const binary = atob(audioB64);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob  = new Blob([bytes], { type: 'audio/mpeg' });
  const url   = URL.createObjectURL(blob);
  const audio = new Audio(url);

  const done = () => {
    URL.revokeObjectURL(url);
    setSpeaking(false);
    setState('listening');
    setTimeout(restartMic, 800);
  };

  audio.onended = done;
  audio.onerror = done;
  audio.play().catch(done);
}

// ── Greeting ─────────────────────────────────────────────────────
let greeted = false;
async function greet() {
  if (greeted) return;
  greeted = true;
  setState('thinking');
  try {
    const res  = await fetch(SERVER + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Поздоровайся с Фаиной — коротко и тепло. Одно предложение.', model: 'chat' })
    });
    const data = await res.json();
    micEnabled = true;
    if (data.reply) {
      const musicMatch = data.reply.match(/\[MUSIC:\s*([^\]]+)\]/);
      if (musicMatch) playMusic(musicMatch[1].trim());
      speak(data.audio);
    } else { setState('listening'); restartMic(); }
  } catch {
    setState('listening');
    micEnabled = true;
    restartMic();
  }
}

// ── Music ────────────────────────────────────────────────────────
function playMusic(query) {
  window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(query), '_blank');
}

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(14,15,20,0.92);cursor:pointer;z-index:100;flex-direction:column;gap:16px;`;
  overlay.innerHTML = `
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:#c9a96e;letter-spacing:0.1em;font-style:italic;">нажмите, чтобы начать</div>
    <div style="width:64px;height:64px;border-radius:50%;border:1px solid rgba(201,169,110,0.4);display:flex;align-items:center;justify-content:center;">
      <div style="width:20px;height:20px;border-radius:50%;background:#c9a96e;opacity:0.7;"></div>
    </div>`;
  overlay.addEventListener('click', () => {
    overlay.remove();
    micEnabled = true;
    greet();
  });
  document.body.appendChild(overlay);
});
</script>
</body>
</html>
