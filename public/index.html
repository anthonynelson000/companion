<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Natasha">
<meta name="theme-color" content="#0e0f14">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Natasha</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f14; --gold: #c9a96e; --gold-dim: #7a6340;
    --blue: #6ab4e8; --text: #e8e0d0; --muted: #6b6658;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif; overflow: hidden; user-select: none; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1c2e 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 100%, #0c0e1a 0%, transparent 60%), var(--bg); }

  /* ── Waveform avatar ── */
  .waveform { display: flex; align-items: center; justify-content: center; gap: 8px; height: 160px; width: 300px; }
  .waveform .bar { width: 6px; border-radius: 3px; background: var(--gold-dim); transition: background 0.4s; }

  body.idle .bar { animation: idle-breathe 3s ease-in-out infinite; }
  .bar:nth-child(1){height:18px;animation-delay:0s}    .bar:nth-child(2){height:28px;animation-delay:0.2s}
  .bar:nth-child(3){height:44px;animation-delay:0.4s}  .bar:nth-child(4){height:66px;animation-delay:0.6s}
  .bar:nth-child(5){height:86px;animation-delay:0.8s}  .bar:nth-child(6){height:106px;animation-delay:1.0s}
  .bar:nth-child(7){height:120px;animation-delay:1.2s} .bar:nth-child(8){height:106px;animation-delay:1.0s}
  .bar:nth-child(9){height:86px;animation-delay:0.8s}  .bar:nth-child(10){height:66px;animation-delay:0.6s}
  .bar:nth-child(11){height:44px;animation-delay:0.4s} .bar:nth-child(12){height:28px;animation-delay:0.2s}
  .bar:nth-child(13){height:18px;animation-delay:0s}
  @keyframes idle-breathe { 0%,100%{transform:scaleY(0.4);opacity:0.25} 50%{transform:scaleY(0.55);opacity:0.35} }

  /* listening — calm ripple in blue */
  body.listening .bar { background: var(--blue); animation: listen-wave 1.6s ease-in-out infinite; }
  @keyframes listen-wave { 0%,100%{transform:scaleY(0.5);opacity:0.5} 50%{transform:scaleY(1.1);opacity:0.9} }

  /* thinking — slow gold pulse, all bars together */
  body.thinking .bar { background: var(--gold-dim); animation: think-pulse 0.9s ease-in-out infinite; }
  @keyframes think-pulse { 0%,100%{transform:scaleY(0.6);opacity:0.4} 50%{transform:scaleY(0.85);opacity:0.7} }

  /* speaking — full gold, fast wave */
  body.speaking .bar { background: var(--gold); animation: speak-wave 0.5s ease-in-out infinite; }
  @keyframes speak-wave { 0%,100%{transform:scaleY(0.7);opacity:0.7} 50%{transform:scaleY(1.3);opacity:1} }

  .name { position: absolute; top: 40px; font-size: 2rem; font-weight: 300;
    letter-spacing: 0.18em; color: rgba(201,169,110,0.5); text-transform: uppercase; }
  .status { margin-top: 32px; font-size: 1.4rem; font-weight: 300; font-style: italic;
    color: var(--muted); letter-spacing: 0.04em; height: 1.6em; text-align: center; transition: color 0.4s; }
  .error-banner { display: none; position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(180,60,60,0.85); color: #fff; padding: 14px 28px; border-radius: 10px;
    font-size: 1.1rem; text-align: center; max-width: 320px; }
  .mic-btn { margin-top: 40px; width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid rgba(201,169,110,0.4); background: rgba(201,169,110,0.06);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: border-color 0.3s, background 0.3s, opacity 0.3s; -webkit-tap-highlight-color: transparent; }
  .mic-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
  body.idle .mic-btn { border-color: rgba(201,169,110,0.5); }
  body.listening .mic-btn { border-color: var(--blue); background: rgba(106,180,232,0.12); }
  body.thinking .mic-btn  { border-color: rgba(201,169,110,0.2); }
  body.speaking .mic-btn  { border-color: rgba(201,169,110,0.2); }
  .mic-icon { width: 32px; height: 32px; }
  body.idle .mic-icon path      { fill: rgba(201,169,110,0.7); }
  body.listening .mic-icon path { fill: var(--blue); }
  body.thinking .mic-icon path  { fill: rgba(201,169,110,0.25); }
  body.speaking .mic-icon path  { fill: rgba(201,169,110,0.25); }
</style>
</head>
<body class="idle">
<div class="name">Наташа</div>
<div class="waveform">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div>
</div>
<div class="status" id="status">слушаю…</div>
<button class="mic-btn" id="micBtn" onclick="startListening()">
  <svg class="mic-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 3C14.3 3 13 4.3 13 6v10c0 1.7 1.3 3 3 3s3-1.3 3-3V6c0-1.7-1.3-3-3-3z"/>
    <path d="M8 14c0 4.4 3.6 8 8 8s8-3.6 8-8" stroke-width="2" stroke-linecap="round" fill="none"/>
    <line x1="16" y1="22" x2="16" y2="27" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="27" x2="20" y2="27" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
<div class="error-banner" id="error"></div>
<div id="debug" style="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;font-family:monospace;font-size:11px;padding:8px;max-height:160px;overflow-y:auto;z-index:999;"></div>


<script>
const SERVER = window.location.hostname === 'localhost' || window.location.protocol === 'file:'
  ? 'http://localhost:3000' : '';

const statusEl = document.getElementById('status');
const errorEl  = document.getElementById('error');
const debugEl  = document.getElementById('debug');

function log(msg) {
  const t = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  debugEl.innerHTML += `<div>[${t}] ${msg}</div>`;
  debugEl.scrollTop = debugEl.scrollHeight;
}

// ── State ────────────────────────────────────────────────────────
let isSpeaking    = false;
let speakingTimer = null;
let recognition   = null;
let micActive     = false;
let appReady      = false;

function setState(state) {
  document.body.className = state;
  const labels = {
    idle:      'нажмите микрофон',
    listening: 'слушаю…',
    thinking:  'думаю…',
    speaking:  'говорю…'
  };
  statusEl.textContent = labels[state] || '';
  const btn = document.getElementById('micBtn');
  if (btn) {
    const hide = (state === 'thinking' || state === 'speaking' || state === 'listening');
    btn.style.visibility = hide ? 'hidden' : 'visible';
    btn.disabled = hide;
  }
}

function showError(msg) {
  errorEl.style.display = 'block';
  errorEl.textContent = msg;
  setTimeout(() => errorEl.style.display = 'none', 5000);
}

// ── Audio unlock ─────────────────────────────────────────────────
// One silent play inside the user gesture unlocks the audio session.
// After that, new Audio() elements work fine at full volume.
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  const a = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
  a.play().catch(() => {});
  log('audio unlocked');
}

function setSpeaking(val) {
  clearTimeout(speakingTimer);
  isSpeaking = val;
  if (val) {
    speakingTimer = setTimeout(() => {
      isSpeaking = false;
      setState('idle');
    }, 60000);
  }
}

// ── Single-shot mic — built fresh each time, started by user tap ──
function startListening() {
  log(`startListening — appReady:${appReady} speaking:${isSpeaking} micActive:${micActive}`);
  if (!appReady || isSpeaking || micActive) { log(`BLOCKED — speaking:${isSpeaking} micActive:${micActive}`); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('Используйте Safari для голосового ввода.'); log('NO SR API'); return; }

  recognition = new SR();
  recognition.lang           = 'ru-RU';
  recognition.continuous     = false;
  recognition.interimResults = false;

  recognition.onstart  = () => { micActive = true; setState('listening'); log('mic started'); };
  recognition.onend    = () => { micActive = false; if (!isSpeaking) setState('idle'); log('mic ended'); };

  recognition.onresult = (e) => {
    micActive = false;
    const text = Array.from(e.results)
      .filter(r => r.isFinal)
      .map(r => r[0].transcript)
      .join(' ')
      .trim();
    log(`heard: "${text}"`);
    if (text.length > 1) sendToAI(text);
    else setState('idle');
  };

  recognition.onerror = (e) => {
    micActive = false;
    log(`mic error: ${e.error}`);
    if (e.error === 'not-allowed') { showError('Разрешите доступ к микрофону в настройках Safari.'); return; }
    // audio-capture = iOS mic conflict; reset and allow retry
    setState('idle');
    document.getElementById('micBtn').disabled = false;
  };

  try { recognition.start(); log('recognition.start() called'); } catch(e) { log(`start exception: ${e}`); micActive = false; setState('idle'); }
}

function stopMic() {
  micActive = false;
  try { recognition && recognition.abort(); } catch(e) {}
}

// ── AI call ──────────────────────────────────────────────────────
async function sendToAI(userText) {
  micActive = false;  // mic hardware is done, only server call in flight now
  stopMic();
  setState('thinking');
  log(`sending to AI: "${userText}"`);
  try {
    const res  = await fetch(SERVER + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText, model: 'chat' })
    });
    const data = await res.json();
    log(`server reply: ${data.error ? 'ERROR:'+data.error : data.reply ? data.reply.substring(0,40)+'…' : 'empty'}`);
    if (data.error) { showError('Ошибка: ' + data.error); setState('idle'); return; }
    if (data.reply) {
      const musicMatch = data.reply.match(/\[MUSIC:\s*([^\]]+)\]/);
      if (musicMatch) playMusic(musicMatch[1].trim());
      speak(data.audio);
    } else { setState('idle'); }
  } catch(err) {
    log(`fetch error: ${err}`);
    showError('Нет соединения с сервером.');
    setState('idle');
  }
}

// ── TTS ──────────────────────────────────────────────────────────
function speak(audioB64) {
  log(`speak called, audio length: ${audioB64 ? audioB64.length : 0}`);
  setSpeaking(true);
  stopMic();
  setState('speaking');

  const binary = atob(audioB64);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob  = new Blob([bytes], { type: 'audio/mpeg' });
  const url   = URL.createObjectURL(blob);
  const audio = new Audio(url);

  let doneCalled = false;
  const done = () => {
    if (doneCalled) return;
    doneCalled = true;
    URL.revokeObjectURL(url);
    setSpeaking(false);
    micActive = false;
    try { recognition && recognition.abort(); } catch(e) {}
    log('audio ended — auto-starting mic');
    showMicBtn(true);
    setTimeout(() => startListening(), 400);
  };

  audio.onended = done;
  audio.onerror = (err) => { log(`audio error: ${err.type}`); done(); };
  audio.play()
    .then(() => log('audio playing'))
    .catch(err => { log(`audio play failed: ${err}`); done(); });
}

// ── Greeting ─────────────────────────────────────────────────────
async function greet() {
  setState('thinking');
  try {
    const res  = await fetch(SERVER + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Поздоровайся с Фаиной — коротко и тепло. Одно предложение.', model: 'chat' })
    });
    const data = await res.json();
    if (data.reply) {
      const musicMatch = data.reply.match(/\[MUSIC:\s*([^\]]+)\]/);
      if (musicMatch) playMusic(musicMatch[1].trim());
      speak(data.audio);
    } else { setState('idle'); }
  } catch {
    setState('idle');
  }
}

// ── Music ────────────────────────────────────────────────────────
function playMusic(query) {
  window.open('https://www.youtube.com/results?search_query=' + encodeURIComponent(query), '_blank');
}

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(14,15,20,0.92);cursor:pointer;z-index:100;flex-direction:column;gap:16px;`;
  overlay.innerHTML = `
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:#c9a96e;letter-spacing:0.1em;font-style:italic;">нажмите, чтобы начать</div>
    <div style="width:64px;height:64px;border-radius:50%;border:1px solid rgba(201,169,110,0.4);display:flex;align-items:center;justify-content:center;">
      <div style="width:20px;height:20px;border-radius:50%;background:#c9a96e;opacity:0.7;"></div>
    </div>`;
  overlay.addEventListener('click', (e) => {
    e.stopPropagation();
    unlockAudio();
    overlay.remove();
    appReady = true;
    log('overlay tapped — appReady=true, greeting…');
    greet();
  });
  document.body.appendChild(overlay);
});
</script>
</body>
</html>
