<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Natasha">
<meta name="theme-color" content="#0e0f14">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Natasha</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f14; --gold: #c9a96e; --gold-dim: #7a6340;
    --blue: #6ab4e8; --text: #e8e0d0; --muted: #6b6658;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif; overflow: hidden; user-select: none; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1c2e 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 100%, #0c0e1a 0%, transparent 60%), var(--bg); }

  .waveform { display: flex; align-items: center; justify-content: center; gap: 8px; height: 160px; width: 300px; }
  .waveform .bar { width: 6px; border-radius: 3px; background: var(--gold-dim); transition: background 0.4s; }

  body.idle .bar { animation: idle-breathe 3s ease-in-out infinite; }
  .bar:nth-child(1){height:18px;animation-delay:0s}    .bar:nth-child(2){height:28px;animation-delay:0.2s}
  .bar:nth-child(3){height:44px;animation-delay:0.4s}  .bar:nth-child(4){height:66px;animation-delay:0.6s}
  .bar:nth-child(5){height:86px;animation-delay:0.8s}  .bar:nth-child(6){height:106px;animation-delay:1.0s}
  .bar:nth-child(7){height:120px;animation-delay:1.2s} .bar:nth-child(8){height:106px;animation-delay:1.0s}
  .bar:nth-child(9){height:86px;animation-delay:0.8s}  .bar:nth-child(10){height:66px;animation-delay:0.6s}
  .bar:nth-child(11){height:44px;animation-delay:0.4s} .bar:nth-child(12){height:28px;animation-delay:0.2s}
  .bar:nth-child(13){height:18px;animation-delay:0s}
  @keyframes idle-breathe { 0%,100%{transform:scaleY(0.4);opacity:0.25} 50%{transform:scaleY(0.55);opacity:0.35} }

  body.listening .bar { background: var(--blue); animation: listen-wave 1.6s ease-in-out infinite; }
  @keyframes listen-wave { 0%,100%{transform:scaleY(0.5);opacity:0.5} 50%{transform:scaleY(1.1);opacity:0.9} }

  body.thinking .bar { background: var(--gold-dim); animation: think-pulse 0.9s ease-in-out infinite; }
  @keyframes think-pulse { 0%,100%{transform:scaleY(0.6);opacity:0.4} 50%{transform:scaleY(0.85);opacity:0.7} }

  body.speaking .bar { background: var(--gold); animation: speak-wave 0.5s ease-in-out infinite; }
  @keyframes speak-wave { 0%,100%{transform:scaleY(0.7);opacity:0.7} 50%{transform:scaleY(1.3);opacity:1} }

  .name { position: absolute; top: 40px; font-size: 2rem; font-weight: 300;
    letter-spacing: 0.18em; color: rgba(201,169,110,0.5); text-transform: uppercase; }
  .status { margin-top: 32px; font-size: 1.4rem; font-weight: 300; font-style: italic;
    color: var(--muted); letter-spacing: 0.04em; height: 1.6em; text-align: center; transition: color 0.4s; }
  .error-banner { display: none; position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(180,60,60,0.85); color: #fff; padding: 14px 28px; border-radius: 10px;
    font-size: 1.1rem; text-align: center; max-width: 320px; }
  .mic-btn { margin-top: 40px; width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid rgba(201,169,110,0.5); background: rgba(201,169,110,0.06);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: border-color 0.3s, background 0.3s; -webkit-tap-highlight-color: transparent; }
  .mic-icon { width: 32px; height: 32px; }
  .mic-icon path { fill: rgba(201,169,110,0.7); }
</style>
</head>
<body class="idle">
<div class="name">Наташа</div>
<div class="waveform">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div>
</div>
<div class="status" id="status"></div>
<button id="micBtn" class="mic-btn" style="visibility:hidden;" onclick="onMicTap()">
  <svg class="mic-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 3C14.3 3 13 4.3 13 6v10c0 1.7 1.3 3 3 3s3-1.3 3-3V6c0-1.7-1.3-3-3-3z"/>
    <path d="M8 14c0 4.4 3.6 8 8 8s8-3.6 8-8" stroke-width="2" stroke-linecap="round" fill="none"/>
    <line x1="16" y1="22" x2="16" y2="27" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="27" x2="20" y2="27" stroke-width="2" stroke-linecent="round"/>
  </svg>
</button>
<div class="error-banner" id="errorBanner"></div>
<div id="debug" style="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;font-family:monospace;font-size:11px;padding:8px;max-height:160px;overflow-y:auto;z-index:999;"></div>

<script>
const SERVER = (window.location.hostname === 'localhost' || window.location.protocol === 'file:') ? 'http://localhost:3000' : '';
const statusEl = document.getElementById('status');
const errorEl  = document.getElementById('errorBanner');
const debugEl  = document.getElementById('debug');
const micBtn   = document.getElementById('micBtn');

function log(msg) {
  const t = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  debugEl.innerHTML += `<div>[${t}] ${msg}</div>`;
  debugEl.scrollTop = debugEl.scrollHeight;
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
  setTimeout(() => errorEl.style.display = 'none', 5000);
}

// ── The only two functions that touch the mic button ─────────────
function showMic()  { micBtn.style.visibility = 'visible'; micBtn.disabled = false; log('mic btn: SHOW'); }
function hideMic()  { micBtn.style.visibility = 'hidden';  micBtn.disabled = true;  log('mic btn: HIDE'); }

// ── Visual state (never touches mic button) ──────────────────────
function setStatus(state) {
  document.body.className = state;
  statusEl.textContent = { idle:'нажмите микрофон', listening:'слушаю…', thinking:'думаю…', speaking:'говорю…' }[state] || '';
}

// ── Audio (single shared element, created on first tap) ──────────
let audio = null;

function unlockAudio() {
  // Must be called inside a user gesture so iOS allows playback
  audio = new Audio();
  audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
  audio.play().catch(() => {});
  log('audio element created and unlocked');
}

// ── Mic tap handler ──────────────────────────────────────────────
function onMicTap() {
  log('mic tapped');
  hideMic();
  startListening();
}

// ── Speech recognition ───────────────────────────────────────────
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('Используйте Safari для голосового ввода.'); showMic(); return; }

  const rec = new SR();
  rec.lang           = 'ru-RU';
  rec.continuous     = false;
  rec.interimResults = false;

  let silenceTimer = null;
  rec.onstart = () => {
    setStatus('listening');
    log('listening…');
    // Force-stop after 8 seconds if nothing heard — iOS sometimes misses silence
    silenceTimer = setTimeout(() => {
      log('silence timeout — stopping rec');
      try { rec.stop(); } catch(e) {}
    }, 8000);
  };

  rec.onresult = (e) => {
    const text = Array.from(e.results)
      .filter(r => r.isFinal)
      .map(r => r[0].transcript)
      .join(' ').trim();
    log(`heard: "${text}"`);
    if (text.length > 1) {
      setStatus('thinking');
      sendToAI(text);
    } else {
      // Nothing heard — show mic again
      setStatus('idle');
      showMic();
    }
  };

  rec.onerror = (e) => {
    log(`mic error: ${e.error}`);
    if (e.error === 'not-allowed') {
      showError('Разрешите доступ к микрофону в настройках Safari.');
    }
    // Always show mic on any error so Faina can try again
    setStatus('idle');
    showMic();
  };

  rec.onend = () => {
    clearTimeout(silenceTimer);
    log('rec ended');
    if (document.body.className === 'idle') showMic();
  };

  try { rec.start(); log('rec.start()'); }
  catch(e) { log(`rec.start failed: ${e}`); setStatus('idle'); showMic(); }
}

// ── Send to AI ───────────────────────────────────────────────────
async function sendToAI(text) {
  try {
    const res  = await fetch(SERVER + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, model: 'chat' })
    });
    const data = await res.json();
    log(`reply: ${data.reply ? data.reply.substring(0,40)+'…' : 'empty'}`);
    if (data.error) { showError('Ошибка: ' + data.error); setStatus('idle'); showMic(); return; }
    if (data.reply)  { speak(data.audio); }
    else             { setStatus('idle'); showMic(); }
  } catch(err) {
    log(`fetch error: ${err}`);
    showError('Нет соединения.');
    setStatus('idle');
    showMic();
  }
}

// ── Speak ────────────────────────────────────────────────────────
function speak(audioB64) {
  log(`speak: ${audioB64 ? audioB64.length : 0} chars`);
  setStatus('speaking');

  const bytes = Uint8Array.from(atob(audioB64), c => c.charCodeAt(0));
  const url   = URL.createObjectURL(new Blob([bytes], { type: 'audio/mpeg' }));

  let finished = false;
  function onDone() {
    if (finished) return;
    finished = true;
    URL.revokeObjectURL(url);
    log('audio done — showing mic');
    setStatus('idle');
    showMic();  // ← step 9: mic appears after Natasha stops
  }

  audio.onended = onDone;
  audio.onerror = () => { log('audio error'); onDone(); };
  audio.src = url;
  audio.play()
    .then(() => log('audio playing'))
    .catch(err => { log(`play failed: ${err}`); onDone(); });
}

// ── Greeting ─────────────────────────────────────────────────────
async function greet() {
  setStatus('thinking');
  try {
    const res  = await fetch(SERVER + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Поздоровайся с Фаиной — коротко и тепло. Одно предложение.', model: 'chat' })
    });
    const data = await res.json();
    if (data.reply) speak(data.audio);
    else { setStatus('idle'); showMic(); }
  } catch {
    setStatus('idle');
    showMic();
  }
}

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(14,15,20,0.92);cursor:pointer;z-index:100;flex-direction:column;gap:16px;`;
  overlay.innerHTML = `
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:#c9a96e;letter-spacing:0.1em;font-style:italic;">нажмите, чтобы начать</div>
    <div style="width:64px;height:64px;border-radius:50%;border:1px solid rgba(201,169,110,0.4);display:flex;align-items:center;justify-content:center;">
      <div style="width:20px;height:20px;border-radius:50%;background:#c9a96e;opacity:0.7;"></div>
    </div>`;
  overlay.addEventListener('click', () => {
    unlockAudio();   // create audio element inside gesture
    overlay.remove();
    log('start tapped — greeting…');
    greet();
  });
  document.body.appendChild(overlay);
});
</script>
</body>
</html>
